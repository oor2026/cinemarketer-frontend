<!-- Plantilla de tarjeta de película con votación propia  -->
<div class="pelicula-card" data-id="{id}" onclick="window.abrirDetallePelicula({id})" style="cursor: pointer;">
    <div class="pelicula-poster">
        <img src="{posterUrl}" alt="{title}"
             onerror="this.src='https://via.placeholder.com/300x450?text=Error+imagen'">
        <div class="pelicula-overlay">
            <div style="display:flex;flex-direction:column;align-items:flex-start;gap:6px;">
                <span class="total-votos" id="totalVotos-{id}">0</span>
                <button class="btn-donde-verla-overlay" onclick="event.stopPropagation(); window.abrirDondeVerla({id}, event)" title="Dónde verla">
                    <i class="fas fa-tv"></i>
                </button>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                <span class="año">{year}</span>
                <button class="btn-watchlist" data-movie-id="{id}"
                        onclick="event.stopPropagation(); window.toggleWatchlist({id}, event)"
                        title="Guardar en mi lista"
                        style="background:rgba(0,0,0,0.5);border:none;color:white;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);transition:background 0.2s;">
                    <i class="fas fa-bookmark" style="font-size:0.85rem;"></i>
                </button>
                <button onclick="event.stopPropagation(); window.compartirPelicula({id}, '{title}')"
                        title="Compartir"
                        style="background:rgba(0,0,0,0.5);border:none;color:white;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);transition:background 0.2s;">
                    <i class="fas fa-share-alt" style="font-size:0.85rem;"></i>
                </button>
            </div>
        </div>
    </div>
    <div class="pelicula-info">
        <h3 class="pelicula-titulo">{title}</h3>

        <p class="pelicula-descripcion">
            {overview} <span class="ver-mas" onclick="event.stopPropagation(); window.abrirDetallePelicula({id})">Ver más</span>
        </p>

        <!-- VOTACIÓN PROPIA DE CINEMARKETER -->
        <div class="votacion-container" id="votacion-{id}">
            <div class="porcentaje-container" id="porcentaje-{id}" style="display: none;">
                <div class="porcentaje-bar" style="width: 0%;"></div>
                <span class="porcentaje-texto">0%</span>
            </div>

            <div class="votacion-buttons">
                <button class="btn-like" onclick="event.stopPropagation(); window.votarPelicula({id}, 'like', event)" title="Me gusta">
                    <i class="fas fa-thumbs-up"></i> <span id="likes-{id}">0</span>
                </button>
                <button class="btn-dislike" onclick="event.stopPropagation(); window.votarPelicula({id}, 'dislike', event)" title="No me gusta">
                    <i class="fas fa-thumbs-down"></i> <span id="dislikes-{id}">0</span>
                </button>
                <button class="btn-comentarios-card" onclick="event.stopPropagation(); window.abrirDetallePelicula({id})" title="Comentarios">
                    <i class="fas fa-comment"></i> <span id="comentarios-card-{id}" class="comentarios-count">0</span>
                </button>
                <button class="btn-recomendar" onclick="event.stopPropagation(); window.abrirPanelRecomendar({id}, event)" title="Recomendar">
                    <i class="fas fa-envelope"></i>
                </button>
            </div>
        </div>
    </div>
</div>
