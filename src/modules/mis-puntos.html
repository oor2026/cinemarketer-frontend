<div class="points-container">
    <!-- Header con resumen de puntos -->
    <div class="points-header">
        <div class="points-summary">
            <i class="fas fa-coins"></i>
            <div>
                <h2>Mis Puntos</h2>
                <p>Historial de transacciones y acumulación</p>
            </div>
        </div>
        <div class="points-total" id="totalPointsDisplay">
            <span class="total-label">Puntos disponibles</span>
            <span class="total-number" id="totalPoints">0</span>
        </div>
    </div>

    <!-- Estadísticas rápidas -->
    <div class="points-stats-wrapper">
        <div class="points-stats">
        <div class="stat-item">
            <i class="fas fa-piggy-bank"></i>
            <div>
                <span class="stat-value" id="accumulatedPoints">0</span>
                <span class="stat-label">Acumulados este mes</span>
            </div>
        </div>
        <div class="stat-item">
            <i class="fas fa-calendar-check"></i>
            <div>
                <span class="stat-value" id="redeemedThisMonth">0</span>
                <span class="stat-label">Canjeados este mes</span>
            </div>
        </div>
        <div class="stat-item">
            <i class="fas fa-trophy"></i>
            <div>
                <span class="stat-value" id="totalRedeemed">0</span>
                <span class="stat-label">Canjeados histórico</span>
            </div>
        </div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="points-filters">
        <button class="filter-btn active" onclick="filterPoints('all')">Todos</button>
        <button class="filter-btn" onclick="filterPoints('earned')">Ganados</button>
        <button class="filter-btn" onclick="filterPoints('redeemed')">Canjeados</button>
        <button class="filter-btn" onclick="filterPoints('spent')">Descontados</button>
        <select class="filter-select" onchange="filterByDate(this.value)">
            <option value="all">Todas las fechas</option>
            <option value="today">Hoy</option>
            <option value="week">Esta semana</option>
            <option value="month">Este mes</option>
            <option value="year">Este año</option>
        </select>
    </div>

    <!-- Lista de transacciones -->
    <div class="transactions-list" id="transactionsList">
        <!-- Las transacciones se cargarán dinámicamente -->
        <div class="loading">Cargando historial...</div>
    </div>

    <!-- Mensaje si no hay transacciones -->
    <div class="no-transactions" id="noTransactions" style="display: none;">
        <i class="fas fa-receipt"></i>
        <h3>Aún no tienes transacciones</h3>
        <p>¡Participa votando y comentando para ganar puntos!</p>

    </div>

    <!-- Paginación -->
    <div class="pagination" id="pagination">
        <button class="page-btn" onclick="changePage('prev')" disabled>Anterior</button>
        <span class="page-info" id="pageInfo">Página 1 de 1</span>
        <button class="page-btn" onclick="changePage('next')" disabled>Siguiente</button>
    </div>
</div>
