<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>Cinemarketer - Recuperar contraseña</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body class="auth-page">
<div class="auth-background"></div>

<div class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-card">

            <!-- Header -->
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h2>¿Olvidaste tu contraseña?</h2>
                <p>Ingresá tu email y te enviaremos un enlace para restablecerla.</p>
            </div>

            <!-- Formulario -->
            <form id="forgotForm" class="auth-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Correo electrónico
                    </label>
                    <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            placeholder="dirección@email.com"
                            autocomplete="email"
                            maxlength="50"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <span class="btn-text">Enviar enlace</span>
                    <span class="btn-loader" style="display:none;">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>

            <!-- Estado de éxito (oculto inicialmente) -->
            <div id="successState" style="display:none; text-align:center; padding: 1rem 0;">
                <div style="width:70px;height:70px;background:#e8f5e9;border-radius:50%;
                            display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;">
                    <i class="fas fa-envelope-open-text" style="color:#4caf50;font-size:1.8rem;"></i>
                </div>
                <h3 style="color:#333;margin-bottom:0.75rem;">¡Revisá tu bandeja!</h3>
                <p style="color:#666;font-size:0.9rem;line-height:1.6;">
                    Si el email está registrado en Cinemarketer, recibirás un enlace para restablecer tu contraseña en los próximos minutos.
                </p>
            </div>

            <!-- Footer -->
            <div class="auth-footer">
                <p class="login-prompt">
                    ¿Recordaste tu contraseña?
                    <a href="login.html" class="login-link">
                        Iniciar sesión <i class="fas fa-arrow-right"></i>
                    </a>
                </p>
            </div>

        </div>
    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email   = document.getElementById('email').value.trim();
        const btn     = document.getElementById('submitBtn');
        const btnText = btn.querySelector('.btn-text');
        const loader  = btn.querySelector('.btn-loader');

        btn.disabled = true;
        btnText.style.display = 'none';
        loader.style.display  = 'inline-block';

        try {
            const response = await fetch(`${CONFIG.API_URL}/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            // Siempre mostrar el estado de éxito (seguridad: no revelar si el email existe)
            document.getElementById('forgotForm').style.display  = 'none';
            document.getElementById('successState').style.display = 'block';

        } catch (error) {
            btn.disabled = false;
            btnText.style.display = 'inline';
            loader.style.display  = 'none';
            alert('Error de conexión con el servidor. Intentá nuevamente.');
        }
    });
</script>
<script src="js/config.js"></script>
<script src="js/footer.js"></script>
</body>
</html>
